# T1: מונחים טכניים ללא תרגום
# See: design/unified-hebrew-principles.md § T1
# Source: Academy decision 5.1 + code-switching research
#
# This rule is intentionally PERMISSIVE: it does not fire on the allowed list.
# Instead, it flags Hebrew translations of terms that should stay in English.

extends: substitution
message: "השאירו '%s' באנגלית במקום '%s'. מונחים טכניים רווחים לא מתרגמים טבעית"
level: suggestion
ignorecase: false
action:
  name: replace
swap:
  'ממשק תכנות יישומים': 'API'
  'זרם עבודה': 'workflow'
  'וו אינטרנטי': 'webhook'
  'מודל שפה גדול': 'LLM'
  'אסימון': 'token'
  'מיועד': 'endpoint'
