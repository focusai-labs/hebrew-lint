# Vale config: hebrew-lint self-test config

StylesPath = styles
MinAlertLevel = suggestion

[*.{md,markdown}]
BasedOnStyles = FocusAI
# HtmlDirLang only makes sense for actual HTML files
FocusAI.HtmlDirLang = NO
FocusAI.UnwrappedEnglishBlock = NO
FocusAI.EnglishButton = NO
# Ignore markdown list items that begin with ✅ or ❌
# These are good/bad example markers in style guide documentation
# and should not be checked themselves.
BlockIgnores = (?m)^\s*[-*][ \t]+[✅❌].*$, \
               (?m)^> *✅.*$, \
               (?m)^> *❌.*$
TokenIgnores = (?s) *(```.*?```), (?s)`[^`]+`

[*.{html,htm}]
BasedOnStyles = FocusAI

[*.{txt,rst,adoc}]
BasedOnStyles = FocusAI
